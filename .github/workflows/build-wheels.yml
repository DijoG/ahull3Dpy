name: Debug Ubuntu build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  debug-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install CGAL and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcgal-dev libeigen3-dev g++ cmake
          echo "=== CGAL installed at: ==="
          find /usr -name "CGAL" -type d 2>/dev/null
          echo "=== CGAL version: ==="
          cat /usr/include/CGAL/version.h | grep VERSION || echo "Version file not found"

      - name: Install Python packages
        run: |
          pip install numpy scipy pybind11 setuptools wheel

      - name: Try to compile (show full error)
        run: |
          echo "=== Starting compilation ==="
          python setup.py build_ext --inplace -v 2>&1 | tee build_output.log
          echo "=== Compilation finished ==="
          echo ""
          echo "=== Checking for errors ==="
          grep -i "error" build_output.log || echo "No errors found in log"
          echo ""
          echo "=== Checking for generated files ==="
          ls -la *.so 2>/dev/null || echo "No .so file found"
          
      - name: Show full build log if failed
        if: failure()
        run: |
          echo "=== FULL BUILD LOG ==="
          cat build_output.log
          
      - name: Check if compilation succeeded
        run: |
          if [ -f "ahull3Dpy_core.so" ]; then
            echo "✅ SUCCESS! Compiled extension found."
            python -c "import ahull3Dpy_core; print('✅ Import works!')"
          else
            echo "❌ FAILED! No compiled extension found."
            echo ""
            echo "=== LAST 50 LINES OF BUILD LOG ==="
            tail -50 build_output.log
            exit 1
          fi