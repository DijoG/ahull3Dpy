name: Build wheels

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel other builds if one fails
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install CGAL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcgal-dev libeigen3-dev

      - name: Install CGAL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update || true
          brew install cgal eigen || true

      - name: Install CGAL (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install cgal:x64-windows

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy pybind11 setuptools wheel

      - name: Build extension
        run: |
          python setup.py build_ext --inplace

      - name: Test import
        run: |
          python -c "import ahull3Dpy_core; print('✅ Core module works!')"

      - name: Build wheel
        run: |
          python setup.py bdist_wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          