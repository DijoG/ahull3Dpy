name: Build wheels

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ----- LINUX -----
      - name: Install CGAL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcgal-dev \
            libeigen3-dev \
            g++ \
            cmake

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pybind11 setuptools wheel

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: |
          # Try building with verbose output
          python setup.py build_ext --inplace -v
          # Test import
          python -c "import ahull3Dpy_core; print('✅ Import successful!')"

      # ----- MACOS -----
      - name: Install CGAL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update || true
          brew install cgal eigen

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pybind11 setuptools wheel

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: |
          python setup.py build_ext --inplace
          python -c "import ahull3Dpy_core; print('✅ Import successful!')"

      # ----- WINDOWS -----
      - name: Install CGAL (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install cgal:x64-windows
          echo "CGAL_INCLUDE_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pybind11 setuptools wheel

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: |
          python setup.py build_ext --inplace
          python -c "import ahull3Dpy_core; print('✅ Import successful!')"

      # ----- BUILD WHEEL -----
      - name: Build wheel
        run: |
          python setup.py bdist_wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl