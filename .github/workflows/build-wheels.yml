name: Build wheels with cibuildwheel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for setup)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install CGAL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcgal-dev libeigen3-dev python3-dev

      - name: Install CGAL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update || true
          brew install cgal eigen

      - name: Install CGAL (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install cgal:x64-windows gmp:x64-windows mpfr:x64-windows
          echo "CGAL_INCLUDE_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV
          echo "GMP_LIBRARY_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          
          # Windows environment
          CIBW_ENVIRONMENT_WINDOWS: >-
            CGAL_INCLUDE_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\include
            GMP_LIBRARY_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\lib
          
          # macOS environment
          CIBW_ENVIRONMENT_MACOS: >-
            CGAL_INCLUDE_PATH=/opt/homebrew/include
          
          # Linux environment - needed for the manylinux container
          CIBW_ENVIRONMENT_LINUX: >-
            CGAL_INCLUDE_PATH=/usr/include
            CPLUS_INCLUDE_PATH=/usr/include
          
          # Linux: Install CGAL in the manylinux container
          CIBW_BEFORE_ALL_LINUX: |
            # Install EPEL and dependencies
            yum install -y epel-release
            yum install -y eigen3-devel python3-devel cmake make wget gcc-c++
            
            # Try to install CGAL from EPEL
            yum install -y cgal-devel || echo "CGAL not in EPEL, building from source..."
            
            # If CGAL not found, build from source
            if ! yum list installed cgal-devel 2>/dev/null; then
              cd /tmp
              wget https://github.com/CGAL/cgal/releases/download/v6.0/CGAL-6.0.tar.gz
              tar -xzf CGAL-6.0.tar.gz
              cd CGAL-6.0
              cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local
              cmake --build build --target install -j4
              cd / && rm -rf /tmp/CGAL-6.0*
            fi
            
            # Create symlink so the compiler can find it
            if [ -d "/usr/local/include/CGAL" ] && [ ! -d "/usr/include/CGAL" ]; then
              ln -s /usr/local/include/CGAL /usr/include/CGAL
            fi
            
            # Verify CGAL is installed
            echo "=== CGAL installation verification ==="
            ls -la /usr/include/CGAL/ | head -20 || echo "CGAL not found in /usr/include"
            ls -la /usr/local/include/CGAL/ | head -20 || echo "CGAL not found in /usr/local/include"
          
          # Before build for all platforms
          CIBW_BEFORE_BUILD: >-
            pip install pybind11 numpy scipy

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl