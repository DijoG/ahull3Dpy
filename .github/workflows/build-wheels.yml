name: Build wheels

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_windows:
    name: Build Windows wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install CGAL (Windows)
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install cgal:x64-windows gmp:x64-windows mpfr:x64-windows
          echo "CGAL_INCLUDE_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV
          echo "GMP_LIBRARY_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV
      
      - name: Build wheels (Windows)
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ENVIRONMENT_WINDOWS: >-
            CGAL_INCLUDE_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\include
            GMP_LIBRARY_PATH=${{ github.workspace }}\vcpkg\installed\x64-windows\lib
          CIBW_BEFORE_BUILD_WINDOWS: >-
            pip install pybind11 numpy scipy
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: ./wheelhouse/*.whl

  build_linux:
    name: Build Linux wheels (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install CGAL and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcgal-dev \
            libeigen3-dev \
            libgmp-dev \
            libmpfr-dev \
            python3-dev \
            g++ \
            cmake
            
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pybind11 setuptools wheel
      
      - name: Build extension
        run: |
          python setup.py build_ext --inplace
      
      - name: Test import
        run: |
          python -c "import ahull3Dpy_core; print('✅ Import works!')"
      
      - name: Test full package
        run: |
          python -c "from ahull3Dpy import ahull3D; import numpy as np; pts = np.random.randn(100, 3); mesh = ahull3D(pts, 0.5); print(f'✅ ahull3D works! Vertices: {mesh[\"vertices\"].shape}')"
      
      - name: Build wheel
        run: |
          python setup.py bdist_wheel
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.python-version }}
          path: dist/*.whl

  build_macos:
    name: Build macOS wheels
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install CGAL (macOS)
        run: |
          brew update || true
          brew install cgal eigen
      
      - name: Build wheels (macOS)
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ENVIRONMENT_MACOS: >-
            CGAL_INCLUDE_PATH=/opt/homebrew/include
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_BEFORE_BUILD_MACOS: >-
            pip install pybind11 numpy scipy
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: ./wheelhouse/*.whl