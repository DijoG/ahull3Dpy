name: Debug Ubuntu build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  debug-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install CGAL and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcgal-dev libeigen3-dev g++ cmake
          # Verify CGAL is installed
          ls -la /usr/include/CGAL/ | head -20

      - name: Install Python packages
        run: |
          pip install numpy scipy pybind11 setuptools wheel

      - name: Try to compile (verbose)
        run: |
          python setup.py build_ext --inplace -v
          
      - name: Check if compilation succeeded
        run: |
          if [ -f "ahull3Dpy_core.so" ]; then
            echo "✅ SUCCESS! Compiled extension found."
            python -c "import ahull3Dpy_core; print('✅ Import works!')"
          else
            echo "❌ FAILED! No compiled extension found."
            echo "Checking for error logs..."
            find . -name "*.log" -exec cat {} \;
            exit 1
          fi